<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完全自動版！ミニSST提案くん</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background-color: white; padding: 2rem; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; max-width: 450px; width: 90%; }
        h1 { color: #333; font-size: 1.5rem; margin-bottom: 20px; }
        .scene-box { min-height: 300px; padding: 20px; border: 2px solid #eee; border-radius: 20px; margin-bottom: 20px; background-color: #fff; }
        .situation { font-weight: bold; font-size: 1.1rem; color: #444; margin-bottom: 15px; }
        
        /* 吹き出し */
        .balloon { background: #f0f0f0; border-radius: 15px; padding: 15px; position: relative; margin-bottom: 25px; border: 2px solid #333; font-weight: bold; }
        .balloon::after { content: ''; position: absolute; bottom: -12px; left: 50%; width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 12px solid #f0f0f0; margin-left: -10px; }

        /* イラストエリア */
        .illustration-area { height: 120px; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        svg { width: 100px; height: 100px; }

        .target-box { background: #fff5f5; border-radius: 12px; padding: 10px; color: #d32f2f; font-weight: bold; visibility: hidden; margin-top: 10px; }
        
        .btn-main { background: #007bff; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 1.1rem; cursor: pointer; transition: 0.3s; width: 100%; font-weight: bold; }
        .btn-main:hover { background: #0056b3; }
        .btn-ans { background: #6c757d; color: white; border: none; padding: 10px 20px; border-radius: 20px; margin-top: 15px; cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>ミニSST場面提案</h1>
    <div class="scene-box" id="scene-content">
        <p>「場面を出す」を押してスタート！</p>
    </div>
    <button class="btn-main" onclick="nextScene()">場面を出す</button>
    <button class="btn-ans" id="ans-btn" style="display:none;" onclick="showAns()">答え・ヒントを見る</button>
</div>

<script>
    const scenes = [
        {
            sit: "友達がサッカーに誘ってくれた時",
            voice: "「ねぇ、一緒にサッカーしようよ！」",
            target: "やりたい時は「いいね！」、嫌な時は理由を添えて「また今度」と言う。",
            // サッカーボールのイラスト（コード）
            svg: '<circle cx="50" cy="50" r="40" fill="white" stroke="black" stroke-width="2"/><path d="M30 30 L50 20 L70 30 L75 50 L65 70 L45 75 L25 65 L20 45 Z" fill="none" stroke="black" stroke-width="2"/>'
        },
        {
            sit: "お母さんが荷物で手がふさがっている時",
            voice: "「うう、重い…ドアを開けてほしいな」",
            target: "「いいよ」と言って、先にドアを開けて待ってあげる。",
            // 荷物のイラスト（コード）
            svg: '<rect x="20" y="30" width="60" height="50" fill="#d2b48c" stroke="black" stroke-width="2"/><path d="M40 30 V10 M60 30 V10" stroke="black" stroke-width="2"/>'
        },
        {
            sit: "お店でお釣りを多くもらいすぎた時",
            voice: "（あれ、お釣りが多いみたい…？）",
            target: "「お釣りが多いですよ」と正直に店員さんに伝える。",
            // お金のイラスト（コード）
            svg: '<circle cx="50" cy="50" r="40" fill="#ffd700" stroke="#b8860b" stroke-width="2"/><text x="50" y="65" font-size="40" text-anchor="middle" font-weight="bold">¥</text>'
        }
    ];

    function nextScene() {
        const s = scenes[Math.floor(Math.random() * scenes.length)];
        const content = document.getElementById('scene-content');
        content.innerHTML = `
            <div class="situation">${s.sit}</div>
            <div class="balloon">${s.voice}</div>
            <div class="illustration-area"><svg viewBox="0 0 100 100">${s.svg}</svg></div>
            <div id="target" class="target-box">${s.target}</div>
        `;
        document.getElementById('ans-btn').style.display = 'inline-block';
    }

    function showAns() {
        document.getElementById('target').style.visibility = 'visible';
    }
</script>

</body>
</html>
